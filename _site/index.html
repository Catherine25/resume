<!doctype html>
<html lang="en">
    <head>
        <title>CV</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="cv-content">
            
            <!-- LEFT COLUMN (Sidebar) -->
            <aside class="left-col" style="display: flex; gap: 1rem; flex-direction: column; background-color: var(--accent1-color);">
                
                <div class="left-col-name">
                    <h2 id="full-name"></h2>
                    <div id="job-title"></div>
                </div>
                
                <img style="width: stretch;" src="profile.jpg" alt="Profile Photo" class="profile-img">
                
                <div class="left-col-text" style="display: flex; flex-direction: column; padding: 2rem;">
                    <section>
                        <h3>Contact</h3>
                        <div class="accent-line"></div>
                        <div id="contact-box"></div>
                    </section>
                    
                    <section>
                        <h3>Skills</h3>
                        <div class="accent-line"></div>
                        <ul id="skills-box" class="skills-list"></ul>
                    </section>
                
                    <section>
                        <h3>Publications</h3>
                        <div class="accent-line"></div>
                        <ul id="publications" class="skills-list"></ul>
                    </section>
                
                  <section>
                        <h3>Certificates</h3>
                        <div class="accent-line"></div>
                        <ul id="skills-box" class="skills-list"></ul>
                  </section>

                  <section>
                        <h3>Languages</h3>
                        <div class="accent-line"></div>
                        <ul id="skills-box" class="skills-list"></ul>
                  </section>
                </div>
                
            </aside>
            
            <!-- RIGHT COLUMN (Main Body) -->
            <main class="right-col">

                <section>
                    <h3>Summary</h3>
                    <div class="accent-line"></div>
                    <p id="summary-box"></p>
                </section>

                <section>
                    <h3>Education</h3>
                    <div class="accent-line"></div>
                    <div id="education-box"></div>
                </section>

                <section>
                    <h3>Experience</h3>
                    <div class="accent-line"></div>
                    <div id="experience-box"></div>
                </section>
            </main>
        </div>
        <script src="app.js"></script>
    </body>
</html>

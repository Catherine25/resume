<!doctype html>
<html lang="en">
    <head>
        <title>CV</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="cv-content">
            
            <!-- LEFT COLUMN (Sidebar) -->
            <aside class="left-col">
                
                <div class="left-col-name">
                    <h2 id="full-name"></h2>
                    <div id="job-title"></div>
                </div>
                
                <img src="./resources/profile.jpg" alt="Profile Photo" class="profile-img">
                
                <div class="left-col-text">
                    <section>
                        <h3>Contact</h3>
                        <div class="accent-line"></div>
                        <div id="contact-box"></div>
                    </section>
                    
                    <section>
                        <h3>Skills</h3>
                        <div class="accent-line"></div>
                        <div id="skills-box" class="skills-list"></div>
                    </section>
                
                    <section>
                        <h3>Publications</h3>
                        <div class="accent-line"></div>
                        <div id="publications"></div>
                    </section>
                
                  <section>
                        <h3>Certificates</h3>
                        <div class="accent-line"></div>
                        <div id="certificates-box"></div>
                  </section>

                  <section>
                        <h3>Languages</h3>
                        <div class="accent-line"></div>
                        <div id="languages-box"></div>
                  </section>
                </div>
                
            </aside>
            
            <!-- RIGHT COLUMN (Main Body) -->
            <main class="right-col">

                <section style="display: none;">
                    <h1>Summary</h1>
                    <div class="accent-line"></div>
                    <p id="summary-box"></p>
                </section>
                
                <section>
                    <h1>Experience</h1>
                    <div class="accent-line"></div>
                    <div id="experience-box"></div>
                </section>

                <section class="section">
                    <h1>Education</h1>
                    <div class="accent-line"></div>
                    <div id="education-box"></div>
                </section>
            </main>
        </div>
        <script src="app.js"></script>
    </body>
    <footer>
        Uicons by <a href="https://www.flaticon.com/uicons" style="color: black;">Flaticon</a>
    </footer>
</html>
